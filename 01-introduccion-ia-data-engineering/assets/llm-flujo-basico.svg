<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo basico de un LLM</title>
  <desc id="desc">Diapositiva visual que explica el paso a paso simplificado de como un LLM responde a un prompt.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f8ff"/>
      <stop offset="100%" stop-color="#f9fbff"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#2d5bba22"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f73d9"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <circle cx="1450" cy="160" r="130" fill="#c8dafd" opacity="0.45"/>
  <text x="95" y="105" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#20335b">Como responde un LLM</text>
  <text x="95" y="153" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#54698f">Version simple y didactica para clase</text>

  <g filter="url(#shadow2)">
    <rect x="90" y="250" width="280" height="280" rx="30" fill="url(#panelBlue)"/>
    <rect x="430" y="250" width="280" height="280" rx="30" fill="url(#panelBlue)"/>
    <rect x="770" y="250" width="280" height="280" rx="30" fill="url(#panelBlue)"/>
    <rect x="1110" y="250" width="280" height="280" rx="30" fill="url(#panelBlue)"/>
  </g>

  <g stroke="#4f73d9" stroke-width="8" fill="none" marker-end="url(#arrow)">
    <line x1="370" y1="390" x2="430" y2="390"/>
    <line x1="710" y1="390" x2="770" y2="390"/>
    <line x1="1050" y1="390" x2="1110" y2="390"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="125" y="315" font-size="26" font-weight="700" fill="#20335b">1. Prompt</text>
    <text x="125" y="360" font-size="20" fill="#42587f">El usuario entrega</text>
    <text x="125" y="390" font-size="20" fill="#42587f">una instruccion,</text>
    <text x="125" y="420" font-size="20" fill="#42587f">contexto y objetivo.</text>

    <text x="465" y="315" font-size="26" font-weight="700" fill="#20335b">2. Tokenizacion</text>
    <text x="465" y="360" font-size="20" fill="#42587f">El texto se divide</text>
    <text x="465" y="390" font-size="20" fill="#42587f">en piezas pequenas</text>
    <text x="465" y="420" font-size="20" fill="#42587f">que el modelo procesa.</text>

    <text x="805" y="315" font-size="26" font-weight="700" fill="#20335b">3. Prediccion</text>
    <text x="805" y="360" font-size="20" fill="#42587f">El modelo estima</text>
    <text x="805" y="390" font-size="20" fill="#42587f">que tokens siguen</text>
    <text x="805" y="420" font-size="20" fill="#42587f">con mayor probabilidad.</text>

    <text x="1145" y="315" font-size="26" font-weight="700" fill="#20335b">4. Respuesta</text>
    <text x="1145" y="360" font-size="20" fill="#42587f">Se genera salida</text>
    <text x="1145" y="390" font-size="20" fill="#42587f">token por token,</text>
    <text x="1145" y="420" font-size="20" fill="#42587f">no por comprension humana.</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="120" y="620" width="1360" height="150" rx="28" fill="#20335b"/>
  </g>
  <text x="165" y="675" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Por que esto importa en clase</text>
  <g font-family="Verdana, Geneva, sans-serif" font-size="22" fill="#dce6ff">
    <text x="165" y="720">• El modelo genera texto plausible, no verdad garantizada</text>
    <text x="165" y="755">• Mientras mejor sea el contexto, mejor suele ser la respuesta</text>
  </g>
</svg>
