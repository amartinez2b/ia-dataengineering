<svg width="1600" height="950" viewBox="0 0 1600 950" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Riesgos y colaboracion humano IA</title>
  <desc id="desc">Ilustracion estilo diapositiva que contrasta riesgos de usar LLM con el flujo recomendado de colaboracion humano IA.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f2"/>
      <stop offset="100%" stop-color="#fffdfb"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#7b3a2220"/>
    </filter>
    <marker id="arrow4" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#314e8a"/>
    </marker>
  </defs>
  <rect width="1600" height="950" fill="url(#bg4)"/>
  <text x="95" y="105" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#4b2416">Usar IA con criterio</text>
  <text x="95" y="153" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#7b584b">Riesgos frecuentes a la izquierda, flujo recomendado a la derecha</text>

  <g filter="url(#shadow4)" font-family="Verdana, Geneva, sans-serif">
    <rect x="90" y="220" width="620" height="600" rx="34" fill="#ffffff"/>
    <rect x="890" y="220" width="620" height="600" rx="34" fill="#ffffff"/>
  </g>

  <text x="135" y="285" font-family="Verdana, Geneva, sans-serif" font-size="32" font-weight="700" fill="#4b2416">Riesgos frecuentes</text>
  <g font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#6b473a">
    <text x="135" y="355">• Alucinaciones y datos inventados</text>
    <text x="135" y="415">• Falta de contexto del proyecto real</text>
    <text x="135" y="475">• Codigo plausible pero incorrecto</text>
    <text x="135" y="535">• Riesgos de privacidad y secretos</text>
    <text x="135" y="595">• Dependencia excesiva del modelo</text>
    <text x="135" y="655">• Falta de pruebas y revision humana</text>
  </g>
  <rect x="135" y="715" width="530" height="72" rx="18" fill="#ffdfd4"/>
  <text x="165" y="760" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700" fill="#8a3f21">Nunca copiar y pegar a produccion sin validar.</text>

  <text x="935" y="285" font-family="Verdana, Geneva, sans-serif" font-size="32" font-weight="700" fill="#243a6b">Flujo recomendado</text>
  <g fill="#e9f0ff" stroke="#8ca8ea" stroke-width="2">
    <rect x="975" y="335" width="450" height="88" rx="22"/>
    <rect x="975" y="470" width="450" height="88" rx="22"/>
    <rect x="975" y="605" width="450" height="88" rx="22"/>
    <rect x="975" y="740" width="450" height="88" rx="22"/>
  </g>
  <g stroke="#314e8a" stroke-width="6" fill="none" marker-end="url(#arrow4)">
    <line x1="1200" y1="423" x2="1200" y2="470"/>
    <line x1="1200" y1="558" x2="1200" y2="605"/>
    <line x1="1200" y1="693" x2="1200" y2="740"/>
  </g>
  <g font-family="Verdana, Geneva, sans-serif">
    <text x="1010" y="390" font-size="24" font-weight="700" fill="#243a6b">1. Definir objetivo y contexto</text>
    <text x="1010" y="525" font-size="24" font-weight="700" fill="#243a6b">2. Pedir borrador o analisis</text>
    <text x="1010" y="660" font-size="24" font-weight="700" fill="#243a6b">3. Revisar supuestos y errores</text>
    <text x="1010" y="795" font-size="24" font-weight="700" fill="#243a6b">4. Probar antes de aceptar</text>
  </g>

  <rect x="90" y="860" width="1420" height="56" rx="18" fill="#243a6b"/>
  <text x="130" y="897" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#eef3ff">La IA aporta mas valor cuando acelera trabajo tecnico bajo supervision humana.</text>
</svg>
