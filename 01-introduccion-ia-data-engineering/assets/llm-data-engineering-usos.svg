<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Usos de LLM en Data Engineering</title>
  <desc id="desc">Ilustracion con cuatro bloques de uso practico de LLM para ingenieros de datos.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbf7"/>
      <stop offset="100%" stop-color="#fbfffd"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2d6b4b20"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <circle cx="1380" cy="130" r="140" fill="#c7efd7" opacity="0.55"/>
  <text x="95" y="105" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#163d2b">Donde un LLM ayuda de verdad</text>
  <text x="95" y="153" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#4d6f60">Pensado para tareas reales de data engineering</text>

  <g filter="url(#shadow3)" font-family="Verdana, Geneva, sans-serif">
    <rect x="120" y="230" width="620" height="220" rx="30" fill="#ffffff"/>
    <rect x="860" y="230" width="620" height="220" rx="30" fill="#ffffff"/>
    <rect x="120" y="500" width="620" height="220" rx="30" fill="#ffffff"/>
    <rect x="860" y="500" width="620" height="220" rx="30" fill="#ffffff"/>

    <text x="165" y="295" font-size="30" font-weight="700" fill="#163d2b">Explicar codigo y pipelines</text>
    <text x="165" y="338" font-size="21" fill="#48675a">Python, SQL, PySpark, DAGs, notebooks, logs y jobs heredados.</text>
    <text x="165" y="378" font-size="21" fill="#48675a">Ideal para entender sistemas existentes mas rapido.</text>

    <text x="905" y="295" font-size="30" font-weight="700" fill="#163d2b">Generar borradores utiles</text>
    <text x="905" y="338" font-size="21" fill="#48675a">Scripts ETL, validaciones, consultas SQL, README, ejemplos base.</text>
    <text x="905" y="378" font-size="21" fill="#48675a">Ahorra tiempo en la primera version, no en la validacion final.</text>

    <text x="165" y="565" font-size="30" font-weight="700" fill="#163d2b">Ayudar en debugging</text>
    <text x="165" y="608" font-size="21" fill="#48675a">Analiza errores, stack traces, fallas de transformacion y sintomas.</text>
    <text x="165" y="648" font-size="21" fill="#48675a">Sirve para proponer hipotesis y siguientes pasos de diagnostico.</text>

    <text x="905" y="565" font-size="30" font-weight="700" fill="#163d2b">Documentar y refactorizar</text>
    <text x="905" y="608" font-size="21" fill="#48675a">Resume procesos, mejora nombres, sugiere estructura y claridad.</text>
    <text x="905" y="648" font-size="21" fill="#48675a">Muy util para equipos que mantienen pipelines con deuda tecnica.</text>
  </g>

  <rect x="120" y="775" width="1360" height="58" rx="18" fill="#163d2b"/>
  <text x="160" y="813" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#effaf4">Regla practica: el LLM aporta mas cuando acelera comprension, borradores y analisis; no cuando reemplaza criterio tecnico.</text>
</svg>
