<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Panorama de IA, ML, Deep Learning y LLMs</title>
  <desc id="desc">Ilustracion en capas que muestra la relacion entre inteligencia artificial, machine learning, deep learning y LLMs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe4"/>
      <stop offset="100%" stop-color="#fffaf3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff6ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#6f4e371f"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1310" cy="120" r="180" fill="#ffd9a8" opacity="0.35"/>
  <circle cx="220" cy="760" r="220" fill="#ffb86b" opacity="0.18"/>
  <text x="110" y="110" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#3c2a1e">Mapa visual del ecosistema</text>
  <text x="110" y="160" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#6a5646">De lo mas amplio a lo mas especializado</text>

  <g filter="url(#shadow)">
    <rect x="90" y="215" rx="42" ry="42" width="1220" height="560" fill="#ffe0ba"/>
    <rect x="170" y="285" rx="36" ry="36" width="1060" height="420" fill="#ffc982"/>
    <rect x="265" y="360" rx="30" ry="30" width="870" height="270" fill="#ffab49"/>
    <rect x="420" y="430" rx="26" ry="26" width="565" height="130" fill="#5f7cff"/>
  </g>

  <text x="170" y="270" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700" fill="#513521">Inteligencia Artificial</text>
  <text x="170" y="312" font-family="Verdana, Geneva, sans-serif" font-size="22" fill="#6f5139">Campo general que busca construir sistemas capaces de resolver tareas complejas</text>

  <text x="248" y="345" font-family="Verdana, Geneva, sans-serif" font-size="32" font-weight="700" fill="#5b3b18">Machine Learning</text>
  <text x="248" y="382" font-family="Verdana, Geneva, sans-serif" font-size="21" fill="#724c24">Subarea donde los modelos aprenden patrones a partir de datos</text>

  <text x="342" y="418" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Deep Learning</text>
  <text x="342" y="454" font-family="Verdana, Geneva, sans-serif" font-size="21" fill="#fff3e0">Redes neuronales profundas para lenguaje, vision, audio y mas</text>

  <text x="463" y="488" font-family="Verdana, Geneva, sans-serif" font-size="32" font-weight="700" fill="#ffffff">LLMs</text>
  <text x="463" y="524" font-family="Verdana, Geneva, sans-serif" font-size="20" fill="#e8ecff">Modelos entrenados para trabajar con lenguaje natural y codigo</text>

  <g filter="url(#shadow)">
    <rect x="1170" y="310" width="300" height="325" rx="28" fill="url(#card)"/>
  </g>
  <text x="1210" y="365" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="700" fill="#3c2a1e">Ejemplos de uso</text>
  <g font-family="Verdana, Geneva, sans-serif" font-size="21" fill="#5e4a3a">
    <text x="1210" y="420">• Chatbots</text>
    <text x="1210" y="462">• Asistentes de codigo</text>
    <text x="1210" y="504">• Resumen de texto</text>
    <text x="1210" y="546">• Traduccion</text>
    <text x="1210" y="588">• Analisis documental</text>
  </g>

  <rect x="110" y="805" rx="16" ry="16" width="925" height="54" fill="#3c2a1e"/>
  <text x="140" y="841" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#fff5eb">Idea clave: no todo ML es un LLM, pero todo LLM vive dentro del universo de IA.</text>
</svg>
