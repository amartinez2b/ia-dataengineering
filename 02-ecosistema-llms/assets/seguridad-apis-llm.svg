<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Seguridad al usar APIs de LLM comerciales</title>
  <desc id="desc">Diagrama visual de buenas practicas para integrar APIs de modelos comerciales de forma segura.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#fcfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1d4ed820"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="90" y="96" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#173b72">Seguridad al consumir APIs de LLMs</text>
  <text x="90" y="142" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#5a77a2">Integracion segura: usuario, backend, controles y proveedor</text>

  <g stroke="#2563eb" stroke-width="6" fill="none" marker-end="url(#arrow)">
    <line x1="310" y1="385" x2="530" y2="385"/>
    <line x1="815" y1="385" x2="1035" y2="385"/>
  </g>

  <g filter="url(#shadow)" font-family="Verdana, Geneva, sans-serif">
    <rect x="90" y="250" width="220" height="270" rx="28" fill="#ffffff"/>
    <rect x="530" y="220" width="285" height="330" rx="28" fill="#ffffff"/>
    <rect x="1035" y="250" width="250" height="270" rx="28" fill="#ffffff"/>
    <rect x="1305" y="220" width="210" height="330" rx="28" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="145" y="320" font-size="30" font-weight="700" fill="#173b72">Usuario</text>
    <text x="122" y="372" font-size="20" fill="#53719a">Prompt, archivos,</text>
    <text x="122" y="402" font-size="20" fill="#53719a">preguntas y contexto</text>

    <text x="585" y="300" font-size="30" font-weight="700" fill="#173b72">Backend seguro</text>
    <text x="565" y="348" font-size="20" fill="#53719a">• valida entrada</text>
    <text x="565" y="382" font-size="20" fill="#53719a">• aplica masking</text>
    <text x="565" y="416" font-size="20" fill="#53719a">• usa secrets manager</text>
    <text x="565" y="450" font-size="20" fill="#53719a">• registra trazas</text>
    <text x="565" y="484" font-size="20" fill="#53719a">• limita herramientas</text>

    <text x="1080" y="320" font-size="30" font-weight="700" fill="#173b72">LLM API</text>
    <text x="1062" y="372" font-size="20" fill="#53719a">Proveedor comercial</text>
    <text x="1062" y="402" font-size="20" fill="#53719a">modelo, tokens y costo</text>

    <text x="1335" y="300" font-size="30" font-weight="700" fill="#173b72">Controles</text>
    <text x="1330" y="348" font-size="20" fill="#53719a">• rotacion de keys</text>
    <text x="1330" y="382" font-size="20" fill="#53719a">• minimo privilegio</text>
    <text x="1330" y="416" font-size="20" fill="#53719a">• aprobacion humana</text>
    <text x="1330" y="450" font-size="20" fill="#53719a">• alertas de uso</text>
    <text x="1330" y="484" font-size="20" fill="#53719a">• auditoria</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="635" width="1380" height="185" rx="28" fill="#173b72"/>
  </g>
  <g font-family="Verdana, Geneva, sans-serif" fill="#eef5ff">
    <text x="150" y="695" font-size="30" font-weight="700">Checklist minima</text>
    <text x="150" y="742" font-size="22">• Nunca exponer la API key en frontend</text>
    <text x="150" y="776" font-size="22">• No enviar secretos ni datos sensibles sin controles</text>
    <text x="760" y="742" font-size="22">• Validar salidas antes de ejecutar acciones</text>
    <text x="760" y="776" font-size="22">• Monitorear costo, abuso y uso anomalo</text>
  </g>
</svg>
