<svg width="1600" height="940" viewBox="0 0 1600 940" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tokens, parametros y memoria</title>
  <desc id="desc">Ilustracion que explica la diferencia entre tokens, parametros y memoria requerida para correr un LLM.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f5ff"/>
      <stop offset="100%" stop-color="#fefcff"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#5b21b620"/>
    </filter>
  </defs>
  <rect width="1600" height="940" fill="url(#bg4)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#3b2060">Tokens, parametros y memoria</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#6e5b8a">Tres conceptos relacionados, pero no equivalentes</text>

  <g filter="url(#shadow4)">
    <rect x="110" y="235" width="410" height="260" rx="30" fill="#ffffff"/>
    <rect x="595" y="235" width="410" height="260" rx="30" fill="#ffffff"/>
    <rect x="1080" y="235" width="410" height="260" rx="30" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="155" y="305" font-size="30" font-weight="700" fill="#3b2060">Tokens</text>
    <text x="155" y="350" font-size="20" fill="#66557e">Cuanto texto entra</text>
    <text x="155" y="380" font-size="20" fill="#66557e">o sale del modelo</text>
    <text x="155" y="430" font-size="20" fill="#66557e">Mas tokens = mas contexto</text>

    <text x="640" y="305" font-size="30" font-weight="700" fill="#3b2060">Parametros</text>
    <text x="640" y="350" font-size="20" fill="#66557e">Tamano interno del modelo</text>
    <text x="640" y="380" font-size="20" fill="#66557e">y su capacidad de patron</text>
    <text x="640" y="430" font-size="20" fill="#66557e">Mas parametros = mas capacidad</text>

    <text x="1125" y="305" font-size="30" font-weight="700" fill="#3b2060">Memoria</text>
    <text x="1125" y="350" font-size="20" fill="#66557e">Lo que necesitas para</text>
    <text x="1125" y="380" font-size="20" fill="#66557e">cargarlo y ejecutarlo</text>
    <text x="1125" y="430" font-size="20" fill="#66557e">Depende de parametros y contexto</text>
  </g>

  <g filter="url(#shadow4)">
    <rect x="110" y="565" width="1380" height="230" rx="30" fill="#ffffff"/>
  </g>
  <text x="160" y="635" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#3b2060">Regla rapida para laboratorio</text>
  <text x="160" y="690" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#66557e">Cada 0.8B de parametros requieren aproximadamente 1 GB de vRAM en una estimacion rapida.</text>
  <text x="160" y="730" font-family="Verdana, Geneva, sans-serif" font-size="22" fill="#66557e">Pero si subes mucho los tokens del prompt, tambien sube la memoria de trabajo durante la inferencia.</text>

  <g font-family="Verdana, Geneva, sans-serif" font-size="23" fill="#3b2060">
    <text x="160" y="780">• Parametros responden a: "¿Cabe el modelo?"</text>
    <text x="770" y="780">• Tokens responden a: "¿Cuanto contexto puede leer?"</text>
  </g>
</svg>
