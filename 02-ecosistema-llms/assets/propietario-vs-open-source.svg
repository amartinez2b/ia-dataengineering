<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Propietario versus open source</title>
  <desc id="desc">Comparacion visual entre modelos propietarios y open source.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f1"/>
      <stop offset="100%" stop-color="#fffdfb"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#854d0e20"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#4a2b17">Dos caminos frecuentes en el ecosistema</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#7a5a47">Ninguno es universalmente mejor: depende del contexto</text>

  <g filter="url(#shadow2)">
    <rect x="110" y="220" width="610" height="560" rx="32" fill="#ffffff"/>
    <rect x="880" y="220" width="610" height="560" rx="32" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="160" y="295" font-size="34" font-weight="700" fill="#4a2b17">Propietario</text>
    <text x="160" y="340" font-size="22" fill="#6f4d39">Ideal cuando priorizas rapidez y calidad inmediata</text>
    <text x="160" y="415" font-size="23" font-weight="700" fill="#4a2b17">Ventajas</text>
    <text x="160" y="455" font-size="21" fill="#624837">• Integracion simple</text>
    <text x="160" y="492" font-size="21" fill="#624837">• Mejor experiencia de usuario</text>
    <text x="160" y="529" font-size="21" fill="#624837">• Modelos muy fuertes por defecto</text>
    <text x="160" y="590" font-size="23" font-weight="700" fill="#4a2b17">Desventajas</text>
    <text x="160" y="630" font-size="21" fill="#624837">• Menos control de pesos y runtime</text>
    <text x="160" y="667" font-size="21" fill="#624837">• Dependencia del proveedor</text>
    <text x="160" y="704" font-size="21" fill="#624837">• Costo por uso</text>

    <text x="930" y="295" font-size="34" font-weight="700" fill="#4a2b17">Open source</text>
    <text x="930" y="340" font-size="22" fill="#6f4d39">Ideal cuando priorizas control, privacidad o local-first</text>
    <text x="930" y="415" font-size="23" font-weight="700" fill="#4a2b17">Ventajas</text>
    <text x="930" y="455" font-size="21" fill="#624837">• Mayor control</text>
    <text x="930" y="492" font-size="21" fill="#624837">• Puede correr localmente</text>
    <text x="930" y="529" font-size="21" fill="#624837">• Flexible para personalizacion</text>
    <text x="930" y="590" font-size="23" font-weight="700" fill="#4a2b17">Desventajas</text>
    <text x="930" y="630" font-size="21" fill="#624837">• Requiere operacion e infraestructura</text>
    <text x="930" y="667" font-size="21" fill="#624837">• Calidad variable segun el setup</text>
    <text x="930" y="704" font-size="21" fill="#624837">• Mas trabajo tecnico inicial</text>
  </g>
</svg>
