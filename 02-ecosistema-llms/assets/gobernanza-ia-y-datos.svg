<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gobernanza de IA y esquema de gobierno de datos</title>
  <desc id="desc">Ilustracion de gobernanza de IA conectada con dominios de negocio, productos de datos, recursos y roles como owners y stewards.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f2"/>
      <stop offset="100%" stop-color="#fffefd"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#9a341220"/>
    </filter>
    <marker id="arrow2" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="url(#bg2)"/>
  <text x="80" y="94" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#6c2d12">Gobernanza de IA conectada con gobierno de datos</text>
  <text x="80" y="140" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#8c5a40">Dominios, productos de datos, recursos y responsables</text>

  <g filter="url(#shadow2)" font-family="Verdana, Geneva, sans-serif">
    <rect x="585" y="190" width="430" height="90" rx="24" fill="#ffffff"/>
    <rect x="90" y="360" width="430" height="430" rx="28" fill="#ffffff"/>
    <rect x="585" y="360" width="430" height="430" rx="28" fill="#ffffff"/>
    <rect x="1080" y="360" width="430" height="430" rx="28" fill="#ffffff"/>
    <rect x="90" y="835" width="1420" height="90" rx="24" fill="#6c2d12"/>
  </g>

  <g stroke="#c2410c" stroke-width="5" fill="none" marker-end="url(#arrow2)">
    <line x1="800" y1="280" x2="305" y2="360"/>
    <line x1="800" y1="280" x2="800" y2="360"/>
    <line x1="800" y1="280" x2="1295" y2="360"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="655" y="246" font-size="30" font-weight="700" fill="#6c2d12">Comite de Gobierno de IA y Datos</text>

    <text x="130" y="420" font-size="30" font-weight="700" fill="#6c2d12">Dominio Comercial</text>
    <text x="130" y="470" font-size="22" fill="#8c5a40">Data Product: Ventas diarias</text>
    <text x="130" y="505" font-size="20" fill="#8c5a40">Recursos: tablas, dashboards, prompts</text>
    <text x="130" y="560" font-size="22" font-weight="700" fill="#6c2d12">Roles</text>
    <text x="130" y="598" font-size="20" fill="#8c5a40">Owner: lider del dominio</text>
    <text x="130" y="630" font-size="20" fill="#8c5a40">Steward: calidad y metadatos</text>
    <text x="130" y="662" font-size="20" fill="#8c5a40">Custodian: plataforma / seguridad</text>
    <text x="130" y="715" font-size="20" fill="#8c5a40">Politicas: acceso, retencion, uso de IA</text>

    <text x="625" y="420" font-size="30" font-weight="700" fill="#6c2d12">Dominio Operaciones</text>
    <text x="625" y="470" font-size="22" fill="#8c5a40">Data Product: Estado de pipelines</text>
    <text x="625" y="505" font-size="20" fill="#8c5a40">Recursos: logs, eventos, catalogo, DAGs</text>
    <text x="625" y="560" font-size="22" font-weight="700" fill="#6c2d12">Roles</text>
    <text x="625" y="598" font-size="20" fill="#8c5a40">Owner: responsable del proceso</text>
    <text x="625" y="630" font-size="20" fill="#8c5a40">Steward: definiciones y SLA</text>
    <text x="625" y="662" font-size="20" fill="#8c5a40">Custodian: ingenieria de datos</text>
    <text x="625" y="715" font-size="20" fill="#8c5a40">Politicas: monitoreo, cambios, calidad</text>

    <text x="1120" y="420" font-size="30" font-weight="700" fill="#6c2d12">Dominio Riesgo y Cumplimiento</text>
    <text x="1120" y="470" font-size="22" fill="#8c5a40">Data Product: inventario de usos de IA</text>
    <text x="1120" y="505" font-size="20" fill="#8c5a40">Recursos: politicas, auditoria, PII</text>
    <text x="1120" y="560" font-size="22" font-weight="700" fill="#6c2d12">Roles</text>
    <text x="1120" y="598" font-size="20" fill="#8c5a40">Owner: compliance o legal</text>
    <text x="1120" y="630" font-size="20" fill="#8c5a40">Steward: gobierno y catalogo</text>
    <text x="1120" y="662" font-size="20" fill="#8c5a40">Custodian: seguridad</text>
    <text x="1120" y="715" font-size="20" fill="#8c5a40">Politicas: riesgo, trazabilidad, aprobacion</text>
  </g>

  <text x="145" y="893" font-family="Verdana, Geneva, sans-serif" font-size="26" font-weight="700" fill="#fff3ec">Idea central: la gobernanza de IA funciona mejor cuando se apoya en estructuras claras de gobierno de datos.</text>
</svg>
