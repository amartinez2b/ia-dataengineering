<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="820" fill="#F4F6FA"/>
  <text x="84" y="90" fill="#1B2430" font-family="Arial, sans-serif" font-size="34" font-weight="700">Riesgos y Controles en IA On Premise</text>
  <text x="84" y="126" fill="#5A6472" font-family="Arial, sans-serif" font-size="20">Cómo reducir fuga de información y acciones destructivas en entornos con bases Oracle</text>

  <rect x="80" y="170" width="560" height="560" rx="28" fill="#FFF4F2" stroke="#D9A49B" stroke-width="2"/>
  <text x="116" y="220" fill="#7A2F21" font-family="Arial, sans-serif" font-size="28" font-weight="700">Riesgos frecuentes</text>
  <circle cx="124" cy="280" r="7" fill="#C9472A"/><text x="146" y="286" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Conexión directa de la IA a producción</text>
  <circle cx="124" cy="334" r="7" fill="#C9472A"/><text x="146" y="340" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Credenciales amplias o compartidas</text>
  <circle cx="124" cy="388" r="7" fill="#C9472A"/><text x="146" y="394" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Prompts con datos sensibles o secretos</text>
  <circle cx="124" cy="442" r="7" fill="#C9472A"/><text x="146" y="448" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Consultas DDL o DML destructivas</text>
  <circle cx="124" cy="496" r="7" fill="#C9472A"/><text x="146" y="502" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Sin auditoría de agentes y consultas</text>
  <circle cx="124" cy="550" r="7" fill="#C9472A"/><text x="146" y="556" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Acceso a datos crudos sin masking</text>
  <circle cx="124" cy="604" r="7" fill="#C9472A"/><text x="146" y="610" fill="#60241A" font-family="Arial, sans-serif" font-size="21">Cambios manuales sin revisión ni rollback</text>

  <rect x="760" y="170" width="560" height="560" rx="28" fill="#F2FBF3" stroke="#8EBB95" stroke-width="2"/>
  <text x="796" y="220" fill="#21562B" font-family="Arial, sans-serif" font-size="28" font-weight="700">Controles recomendados</text>
  <circle cx="804" cy="280" r="7" fill="#2D8A3D"/><text x="826" y="286" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">Read replicas y vistas read-only</text>
  <circle cx="804" cy="334" r="7" fill="#2D8A3D"/><text x="826" y="340" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">SSO, MFA y cuentas técnicas separadas</text>
  <circle cx="804" cy="388" r="7" fill="#2D8A3D"/><text x="826" y="394" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">Vault y rotación de secretos</text>
  <circle cx="804" cy="442" r="7" fill="#2D8A3D"/><text x="826" y="448" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">Bloqueo de DELETE, DROP y ALTER</text>
  <circle cx="804" cy="496" r="7" fill="#2D8A3D"/><text x="826" y="502" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">Logs centralizados y auditoría unificada</text>
  <circle cx="804" cy="550" r="7" fill="#2D8A3D"/><text x="826" y="556" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">DLP, masking y clasificación de datos</text>
  <circle cx="804" cy="604" r="7" fill="#2D8A3D"/><text x="826" y="610" fill="#1E4525" font-family="Arial, sans-serif" font-size="21">CI/CD con revisión, pruebas y rollback</text>

  <path d="M642 280H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 334H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 388H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 442H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 496H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 550H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M642 604H758" stroke="#B7BDC8" stroke-width="3" stroke-dasharray="10 10"/>

  <text x="84" y="780" fill="#6B7280" font-family="Arial, sans-serif" font-size="18">La seguridad no depende de un único control: depende de combinar identidad, segmentación, secretos, DLP, auditoría y disciplina operativa.</text>
</svg>
