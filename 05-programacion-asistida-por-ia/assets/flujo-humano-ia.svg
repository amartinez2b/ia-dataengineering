<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo humano IA</title>
  <desc id="desc">Diagrama del flujo moderno de trabajo entre humano e inteligencia artificial.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3fbf7"/>
      <stop offset="100%" stop-color="#fcfffd"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1665341f"/>
    </filter>
    <marker id="arrow3" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
  </defs>
  <rect width="1600" height="920" fill="url(#bg3)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#14532d">Metodologia moderna humano-IA</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#4d6e60">Un flujo simple para trabajar con mas velocidad sin perder control</text>

  <g stroke="#15803d" stroke-width="6" fill="none" marker-end="url(#arrow3)">
    <line x1="220" y1="430" x2="410" y2="430"/>
    <line x1="540" y1="430" x2="730" y2="430"/>
    <line x1="860" y1="430" x2="1050" y2="430"/>
    <line x1="1180" y1="430" x2="1370" y2="430"/>
  </g>

  <g filter="url(#shadow3)">
    <rect x="90" y="300" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="410" y="300" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="730" y="300" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="1050" y="300" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="1370" y="300" width="140" height="260" rx="28" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="130" y="375" font-size="26" font-weight="700" fill="#14532d">1. Definir</text>
    <text x="130" y="415" font-size="20" fill="#4d6e60">problema,</text>
    <text x="130" y="445" font-size="20" fill="#4d6e60">objetivo y</text>
    <text x="130" y="475" font-size="20" fill="#4d6e60">restricciones</text>

    <text x="448" y="375" font-size="26" font-weight="700" fill="#14532d">2. Pedir</text>
    <text x="448" y="415" font-size="20" fill="#4d6e60">analisis o</text>
    <text x="448" y="445" font-size="20" fill="#4d6e60">borrador</text>

    <text x="768" y="375" font-size="26" font-weight="700" fill="#14532d">3. Revisar</text>
    <text x="768" y="415" font-size="20" fill="#4d6e60">supuestos,</text>
    <text x="768" y="445" font-size="20" fill="#4d6e60">riesgos y</text>
    <text x="768" y="475" font-size="20" fill="#4d6e60">calidad</text>

    <text x="1088" y="375" font-size="26" font-weight="700" fill="#14532d">4. Probar</text>
    <text x="1088" y="415" font-size="20" fill="#4d6e60">validar,</text>
    <text x="1088" y="445" font-size="20" fill="#4d6e60">corregir e</text>
    <text x="1088" y="475" font-size="20" fill="#4d6e60">iterar</text>

    <text x="1390" y="375" font-size="26" font-weight="700" fill="#14532d">5. Integrar</text>
    <text x="1390" y="415" font-size="20" fill="#4d6e60">solo lo</text>
    <text x="1390" y="445" font-size="20" fill="#4d6e60">validado</text>
  </g>

  <rect x="120" y="700" width="1360" height="58" rx="18" fill="#14532d"/>
  <text x="160" y="738" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#eefcf5">La IA acelera el ciclo, pero el humano sigue siendo responsable de criterio, pruebas e integracion.</text>
</svg>
