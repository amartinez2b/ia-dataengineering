<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Que delegar y que no delegar a la IA</title>
  <desc id="desc">Matriz visual para entender que tareas conviene delegar a la IA y cuales requieren validacion humana estricta.</desc>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9f2"/>
      <stop offset="100%" stop-color="#fffefd"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#a1620720"/>
    </filter>
  </defs>
  <rect width="1600" height="920" fill="url(#bg4)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#713f12">Que conviene delegar y que no</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#8b6a44">Delegar no significa desentenderse: significa decidir con criterio</text>

  <g filter="url(#shadow4)">
    <rect x="100" y="230" width="640" height="560" rx="32" fill="#ffffff"/>
    <rect x="860" y="230" width="640" height="560" rx="32" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="160" y="305" font-size="34" font-weight="700" fill="#713f12">Conviene delegar a la IA</text>
    <text x="160" y="370" font-size="22" fill="#8b6a44">• Borradores de codigo</text>
    <text x="160" y="410" font-size="22" fill="#8b6a44">• Explicaciones tecnicas</text>
    <text x="160" y="450" font-size="22" fill="#8b6a44">• Refactors iniciales</text>
    <text x="160" y="490" font-size="22" fill="#8b6a44">• Documentacion</text>
    <text x="160" y="530" font-size="22" fill="#8b6a44">• Casos base de prueba</text>
    <text x="160" y="570" font-size="22" fill="#8b6a44">• Primer analisis de errores</text>

    <text x="920" y="305" font-size="34" font-weight="700" fill="#713f12">No delegar sin revision</text>
    <text x="920" y="370" font-size="22" fill="#8b6a44">• Arquitectura critica</text>
    <text x="920" y="410" font-size="22" fill="#8b6a44">• Seguridad</text>
    <text x="920" y="450" font-size="22" fill="#8b6a44">• Manejo de secretos</text>
    <text x="920" y="490" font-size="22" fill="#8b6a44">• Cumplimiento</text>
    <text x="920" y="530" font-size="22" fill="#8b6a44">• Cambios productivos sin pruebas</text>
    <text x="920" y="570" font-size="22" fill="#8b6a44">• Decisiones de alto impacto</text>
  </g>
</svg>
