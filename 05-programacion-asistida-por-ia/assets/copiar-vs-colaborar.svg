<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Copiar codigo vs colaborar con IA</title>
  <desc id="desc">Comparacion visual entre uso superficial de IA y colaboracion tecnica responsable.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f2"/>
      <stop offset="100%" stop-color="#fffefd"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#9a341220"/>
    </filter>
  </defs>
  <rect width="1600" height="920" fill="url(#bg2)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#6c2d12">No es lo mismo copiar que colaborar</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#8c5a40">La calidad depende de como usamos la IA, no solo de si la usamos</text>

  <g filter="url(#shadow2)">
    <rect x="110" y="220" width="620" height="580" rx="32" fill="#ffffff"/>
    <rect x="870" y="220" width="620" height="580" rx="32" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="170" y="295" font-size="34" font-weight="700" fill="#6c2d12">Copiar codigo</text>
    <text x="170" y="360" font-size="22" fill="#8c5a40">• No entender la respuesta</text>
    <text x="170" y="400" font-size="22" fill="#8c5a40">• Pegar sin revisar</text>
    <text x="170" y="440" font-size="22" fill="#8c5a40">• No probar</text>
    <text x="170" y="480" font-size="22" fill="#8c5a40">• No validar supuestos</text>
    <text x="170" y="520" font-size="22" fill="#8c5a40">• Aumentar deuda tecnica</text>
    <text x="170" y="600" font-size="24" font-weight="700" fill="#6c2d12">Riesgo</text>
    <text x="170" y="642" font-size="21" fill="#8c5a40">Rapidez aparente, calidad real incierta</text>

    <text x="930" y="295" font-size="34" font-weight="700" fill="#6c2d12">Colaborar con IA</text>
    <text x="930" y="360" font-size="22" fill="#8c5a40">• Dar contexto</text>
    <text x="930" y="400" font-size="22" fill="#8c5a40">• Refinar prompts</text>
    <text x="930" y="440" font-size="22" fill="#8c5a40">• Revisar calidad</text>
    <text x="930" y="480" font-size="22" fill="#8c5a40">• Probar antes de integrar</text>
    <text x="930" y="520" font-size="22" fill="#8c5a40">• Usar Git para experimentar</text>
    <text x="930" y="600" font-size="24" font-weight="700" fill="#6c2d12">Resultado</text>
    <text x="930" y="642" font-size="21" fill="#8c5a40">Mas criterio, mas control, mejor calidad</text>
  </g>
</svg>
