<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Programacion tradicional vs programacion asistida por IA</title>
  <desc id="desc">Comparacion visual entre el flujo tradicional y el flujo asistido por inteligencia artificial.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8ff"/>
      <stop offset="100%" stop-color="#fcfdff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#33415520"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#1f2a44">Dos formas de programar</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#5b6785">El cambio no elimina trabajo: redistribuye el esfuerzo</text>

  <g filter="url(#shadow)">
    <rect x="100" y="220" width="620" height="560" rx="30" fill="#ffffff"/>
    <rect x="880" y="220" width="620" height="560" rx="30" fill="#ffffff"/>
  </g>

  <g font-family="Verdana, Geneva, sans-serif">
    <text x="160" y="295" font-size="32" font-weight="700" fill="#1f2a44">Programacion tradicional</text>
    <text x="160" y="360" font-size="22" fill="#56627d">1. Entender el problema</text>
    <text x="160" y="402" font-size="22" fill="#56627d">2. Diseñar la solucion</text>
    <text x="160" y="444" font-size="22" fill="#56627d">3. Escribir codigo a mano</text>
    <text x="160" y="486" font-size="22" fill="#56627d">4. Probar y corregir</text>
    <text x="160" y="528" font-size="22" fill="#56627d">5. Documentar</text>
    <text x="160" y="620" font-size="24" font-weight="700" fill="#1f2a44">Foco principal</text>
    <text x="160" y="662" font-size="21" fill="#56627d">Escritura manual y ejecucion detallada</text>

    <text x="940" y="295" font-size="32" font-weight="700" fill="#1f2a44">Programacion asistida por IA</text>
    <text x="940" y="360" font-size="22" fill="#56627d">1. Definir el objetivo</text>
    <text x="940" y="402" font-size="22" fill="#56627d">2. Dar contexto y restricciones</text>
    <text x="940" y="444" font-size="22" fill="#56627d">3. Pedir borradores o analisis</text>
    <text x="940" y="486" font-size="22" fill="#56627d">4. Revisar y probar</text>
    <text x="940" y="528" font-size="22" fill="#56627d">5. Corregir e integrar</text>
    <text x="940" y="620" font-size="24" font-weight="700" fill="#1f2a44">Foco principal</text>
    <text x="940" y="662" font-size="21" fill="#56627d">Especificacion, evaluacion y validacion</text>
  </g>
</svg>
