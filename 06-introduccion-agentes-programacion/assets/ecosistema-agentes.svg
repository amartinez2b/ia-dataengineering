<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ecosistema de agentes de programacion</title>
  <desc id="desc">Mapa visual de herramientas de agentes de programacion y sus orientaciones principales.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3fbf7"/>
      <stop offset="100%" stop-color="#fcfffd"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1665341f"/>
    </filter>
  </defs>
  <rect width="1600" height="920" fill="url(#bg3)"/>
  <text x="90" y="100" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#14532d">Algunas herramientas del ecosistema actual</text>
  <text x="90" y="148" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#4d6e60">Distintas interfaces, distinta autonomia, pero una misma idea: IA que trabaja con herramientas</text>
  <g filter="url(#shadow3)">
    <rect x="90" y="240" width="300" height="220" rx="28" fill="#ffffff"/>
    <rect x="450" y="240" width="300" height="220" rx="28" fill="#ffffff"/>
    <rect x="810" y="240" width="300" height="220" rx="28" fill="#ffffff"/>
    <rect x="1170" y="240" width="300" height="220" rx="28" fill="#ffffff"/>
  </g>
  <g font-family="Verdana, Geneva, sans-serif">
    <text x="145" y="315" font-size="30" font-weight="700" fill="#14532d">Claude Code</text>
    <text x="145" y="355" font-size="20" fill="#4d6e60">Terminal-first</text>
    <text x="145" y="385" font-size="20" fill="#4d6e60">edicion + comandos</text>

    <text x="525" y="315" font-size="30" font-weight="700" fill="#14532d">Codex</text>
    <text x="525" y="355" font-size="20" fill="#4d6e60">CLI e IDE</text>
    <text x="525" y="385" font-size="20" fill="#4d6e60">MCP y agentes</text>

    <text x="885" y="315" font-size="30" font-weight="700" fill="#14532d">Cursor</text>
    <text x="885" y="355" font-size="20" fill="#4d6e60">IDE-first + CLI</text>
    <text x="885" y="385" font-size="20" fill="#4d6e60">agentes y shell mode</text>

    <text x="1245" y="315" font-size="30" font-weight="700" fill="#14532d">Gemini CLI</text>
    <text x="1245" y="355" font-size="20" fill="#4d6e60">Terminal-first</text>
    <text x="1245" y="385" font-size="20" fill="#4d6e60">ReAct + MCP</text>
  </g>
</svg>
