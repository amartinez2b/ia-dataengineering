<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura basica de un agente</title>
  <desc id="desc">Diagrama simplificado de la arquitectura de un agente de programacion.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f2"/>
      <stop offset="100%" stop-color="#fffefd"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#9a341220"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
  </defs>
  <rect width="1600" height="920" fill="url(#bg2)"/>
  <text x="90" y="100" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#6c2d12">Arquitectura basica de un agente</text>
  <text x="90" y="148" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#8c5a40">Modelo, contexto, herramientas y ciclo de observacion-accion</text>
  <g stroke="#c2410c" stroke-width="6" fill="none" marker-end="url(#arrow)">
    <line x1="310" y1="410" x2="470" y2="410"/>
    <line x1="690" y1="410" x2="850" y2="410"/>
    <line x1="1070" y1="410" x2="1230" y2="410"/>
  </g>
  <g filter="url(#shadow2)">
    <rect x="90" y="280" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="470" y="280" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="850" y="280" width="220" height="260" rx="28" fill="#ffffff"/>
    <rect x="1230" y="280" width="220" height="260" rx="28" fill="#ffffff"/>
  </g>
  <g font-family="Verdana, Geneva, sans-serif">
    <text x="145" y="360" font-size="28" font-weight="700" fill="#6c2d12">Contexto</text>
    <text x="145" y="405" font-size="20" fill="#8c5a40">archivos,</text>
    <text x="145" y="435" font-size="20" fill="#8c5a40">instrucciones,</text>
    <text x="145" y="465" font-size="20" fill="#8c5a40">historial</text>

    <text x="535" y="360" font-size="28" font-weight="700" fill="#6c2d12">Modelo</text>
    <text x="535" y="405" font-size="20" fill="#8c5a40">razona,</text>
    <text x="535" y="435" font-size="20" fill="#8c5a40">planifica y</text>
    <text x="535" y="465" font-size="20" fill="#8c5a40">decide</text>

    <text x="892" y="360" font-size="28" font-weight="700" fill="#6c2d12">Herramientas</text>
    <text x="892" y="405" font-size="20" fill="#8c5a40">terminal,</text>
    <text x="892" y="435" font-size="20" fill="#8c5a40">editor, MCP,</text>
    <text x="892" y="465" font-size="20" fill="#8c5a40">web</text>

    <text x="1275" y="360" font-size="28" font-weight="700" fill="#6c2d12">Iteracion</text>
    <text x="1275" y="405" font-size="20" fill="#8c5a40">observa,</text>
    <text x="1275" y="435" font-size="20" fill="#8c5a40">actua, revisa,</text>
    <text x="1275" y="465" font-size="20" fill="#8c5a40">corrige</text>
  </g>
  <rect x="110" y="660" width="1380" height="62" rx="18" fill="#6c2d12"/>
  <text x="150" y="700" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#fff3ec">Mientras mejor sea el contexto y mas claros los limites, mejor suele comportarse el agente.</text>
</svg>
