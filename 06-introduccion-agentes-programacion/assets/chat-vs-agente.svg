<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chat versus agente</title>
  <desc id="desc">Comparacion visual entre un chat de IA y un agente de programacion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#fcfdff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#33415520"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="102" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="#1f2a44">Responder no es lo mismo que actuar</text>
  <text x="90" y="150" font-family="Verdana, Geneva, sans-serif" font-size="24" fill="#5b6785">El salto del chat al agente aparece cuando la IA puede usar herramientas</text>
  <g filter="url(#shadow)">
    <rect x="110" y="230" width="620" height="540" rx="32" fill="#ffffff"/>
    <rect x="870" y="230" width="620" height="540" rx="32" fill="#ffffff"/>
  </g>
  <g font-family="Verdana, Geneva, sans-serif">
    <text x="170" y="305" font-size="34" font-weight="700" fill="#1f2a44">Chat de IA</text>
    <text x="170" y="365" font-size="22" fill="#56627d">• Responde preguntas</text>
    <text x="170" y="405" font-size="22" fill="#56627d">• Genera texto o codigo</text>
    <text x="170" y="445" font-size="22" fill="#56627d">• El usuario ejecuta manualmente</text>
    <text x="170" y="485" font-size="22" fill="#56627d">• Menor capacidad operativa</text>
    <text x="170" y="570" font-size="24" font-weight="700" fill="#1f2a44">Unidad de valor</text>
    <text x="170" y="612" font-size="21" fill="#56627d">Respuesta o sugerencia</text>

    <text x="930" y="305" font-size="34" font-weight="700" fill="#1f2a44">Agente de programacion</text>
    <text x="930" y="365" font-size="22" fill="#56627d">• Lee contexto y archivos</text>
    <text x="930" y="405" font-size="22" fill="#56627d">• Usa terminal y editor</text>
    <text x="930" y="445" font-size="22" fill="#56627d">• Ejecuta pasos y revisa resultados</text>
    <text x="930" y="485" font-size="22" fill="#56627d">• Puede iterar sobre una tarea</text>
    <text x="930" y="570" font-size="24" font-weight="700" fill="#1f2a44">Unidad de valor</text>
    <text x="930" y="612" font-size="21" fill="#56627d">Resultado operativo dentro del entorno</text>
  </g>
</svg>
