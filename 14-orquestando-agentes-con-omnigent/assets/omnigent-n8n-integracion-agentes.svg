<svg width="1400" height="960" viewBox="0 0 1400 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="960" fill="#F6F3EE"/>
  <rect x="40" y="34" width="1320" height="892" rx="28" fill="#FFFDFC" stroke="#D8D1C8" stroke-width="2"/>

  <text x="86" y="92" fill="#1E2B36" font-family="Arial, sans-serif" font-size="34" font-weight="700">Cómo se integran los agentes con Omnigent y con n8n</text>
  <text x="86" y="126" fill="#5E6872" font-family="Arial, sans-serif" font-size="20">Omnigent coordina sesiones y políticas de agentes; n8n automatiza procesos, integraciones y disparadores alrededor de ellos.</text>

  <rect x="92" y="178" width="294" height="644" rx="26" fill="#F1F7FF" stroke="#8DB0DD" stroke-width="2"/>
  <text x="124" y="222" fill="#23405D" font-family="Arial, sans-serif" font-size="28" font-weight="700">Agentes especializados</text>
  <text x="124" y="254" fill="#23405D" font-family="Arial, sans-serif" font-size="18">Los agentes se conectan a Omnigent mediante runners o harnesses compatibles.</text>

  <rect x="124" y="292" width="230" height="58" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="195" y="327" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">Codex</text>

  <rect x="124" y="372" width="230" height="58" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="176" y="407" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">Claude Code</text>

  <rect x="124" y="452" width="230" height="58" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="141" y="487" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">OpenAI Agents SDK</text>

  <rect x="124" y="532" width="230" height="58" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="177" y="567" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">Agente de datos</text>

  <rect x="124" y="612" width="230" height="58" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="159" y="647" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">Agente research</text>

  <rect x="124" y="692" width="230" height="92" rx="18" fill="#FFFFFF" stroke="#8DB0DD" stroke-width="1.5"/>
  <text x="155" y="728" fill="#23405D" font-family="Arial, sans-serif" font-size="20" font-weight="700">Agentes custom / internos</text>
  <text x="147" y="760" fill="#4D6076" font-family="Arial, sans-serif" font-size="17">Cualquier harness adicional</text>

  <rect x="476" y="224" width="446" height="548" rx="28" fill="#FFF0D7" stroke="#C89D58" stroke-width="2"/>
  <text x="514" y="276" fill="#5B3C10" font-family="Arial, sans-serif" font-size="34" font-weight="700">Omnigent</text>
  <text x="514" y="312" fill="#5B3C10" font-family="Arial, sans-serif" font-size="21">Meta-harness que unifica sesiones de agentes con control, colaboración y portabilidad.</text>

  <rect x="514" y="346" width="156" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="545" y="379" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Runners comunes</text>

  <rect x="688" y="346" width="156" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="722" y="379" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Sesiones vivas</text>

  <rect x="514" y="420" width="160" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="557" y="453" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Políticas</text>

  <rect x="692" y="420" width="152" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="723" y="453" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Presupuestos</text>

  <rect x="514" y="494" width="160" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="543" y="527" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Colaboración</text>

  <rect x="692" y="494" width="152" height="52" rx="18" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="719" y="527" fill="#5B3C10" font-family="Arial, sans-serif" font-size="19" font-weight="700">Aprobaciones</text>

  <rect x="514" y="592" width="330" height="128" rx="20" fill="#FFFFFF" stroke="#C89D58" stroke-width="1.5"/>
  <text x="544" y="630" fill="#5B3C10" font-family="Arial, sans-serif" font-size="22" font-weight="700">Canales de consumo</text>
  <text x="544" y="664" fill="#5B3C10" font-family="Arial, sans-serif" font-size="18">Terminal, web, app, API, sesiones</text>
  <text x="544" y="692" fill="#5B3C10" font-family="Arial, sans-serif" font-size="18">compartidas y revisión en equipo.</text>

  <rect x="1008" y="178" width="292" height="644" rx="26" fill="#FBECEF" stroke="#C98099" stroke-width="2"/>
  <text x="1042" y="222" fill="#5D273A" font-family="Arial, sans-serif" font-size="28" font-weight="700">n8n</text>
  <text x="1042" y="254" fill="#5D273A" font-family="Arial, sans-serif" font-size="18">Automatiza workflows, integra sistemas y puede invocar o recibir resultados de Omnigent.</text>

  <rect x="1042" y="292" width="224" height="58" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1087" y="327" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Triggers y webhooks</text>

  <rect x="1042" y="372" width="224" height="58" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1100" y="407" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Workflows visuales</text>

  <rect x="1042" y="452" width="224" height="58" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1082" y="487" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Integración con APIs</text>

  <rect x="1042" y="532" width="224" height="58" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1096" y="567" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Human in the loop</text>

  <rect x="1042" y="612" width="224" height="58" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1099" y="647" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Aplicaciones y SaaS</text>

  <rect x="1042" y="692" width="224" height="92" rx="18" fill="#FFFFFF" stroke="#C98099" stroke-width="1.5"/>
  <text x="1086" y="728" fill="#5D273A" font-family="Arial, sans-serif" font-size="20" font-weight="700">ETL, alertas y procesos</text>
  <text x="1088" y="760" fill="#7B4A5C" font-family="Arial, sans-serif" font-size="17">Secuencias repetibles de negocio</text>

  <rect x="454" y="108" width="492" height="78" rx="20" fill="#E8F7EE" stroke="#73A685" stroke-width="2"/>
  <text x="484" y="140" fill="#1F4B2B" font-family="Arial, sans-serif" font-size="22" font-weight="700">Usuarios, equipos y sistemas consumidores</text>
  <text x="484" y="170" fill="#1F4B2B" font-family="Arial, sans-serif" font-size="18">Personas, apps y procesos consumen Omnigent directamente o lo integran dentro de un flujo mayor con n8n.</text>

