  <path d="M900 272V318" stroke="#5D748C" stroke-width="4" stroke-linecap="round"/>
  <path d="M1152 272V318H700V344" stroke="#5D748C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M296 442H340" stroke="#5D748C" stroke-width="4" stroke-linecap="round"/>
  <path d="M1060 442H1104" stroke="#5D748C" stroke-width="4" stroke-linecap="round"/>

  <path d="M700 540V620" stroke="#5D748C" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 620H228V716" stroke="#5D748C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 620H446V716" stroke="#5D748C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 620V716" stroke="#5D748C" stroke-width="4" stroke-linecap="round"/>
  <path d="M700 620H851V716" stroke="#5D748C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 620H1127V716" stroke="#5D748C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="94" y="842" fill="#6E6358" font-family="Arial, sans-serif" font-size="18">Idea visual: Omnigent no sustituye a cada agente, sino que se coloca encima para unificar sesiones, políticas, colaboración y acceso.</text>
</svg>
