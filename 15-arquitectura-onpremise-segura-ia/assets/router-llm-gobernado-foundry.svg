  <rect width="1500" height="900" fill="#F5F3EE"/>
  <text x="84" y="92" fill="#1F2833" font-family="Arial, sans-serif" font-size="36" font-weight="700">Plataforma Gobernada de LLMs con Router</text>
  <text x="84" y="130" fill="#5E6570" font-family="Arial, sans-serif" font-size="20">El router se ubica entre aplicaciones/agentes y los modelos, aplicando gobierno, costo y selección dinámica</text>

  <rect x="90" y="212" width="270" height="122" rx="22" fill="#DCEBFA" stroke="#759ED0" stroke-width="2"/>
  <text x="122" y="260" fill="#1D3F62" font-family="Arial, sans-serif" font-size="28" font-weight="700">Usuarios y Apps</text>
  <text x="122" y="296" fill="#1D3F62" font-family="Arial, sans-serif" font-size="18">Analistas, agentes,</text>
  <text x="122" y="322" fill="#1D3F62" font-family="Arial, sans-serif" font-size="18">copilots y APIs internas</text>

  <rect x="430" y="186" width="400" height="176" rx="24" fill="#FFF2CF" stroke="#C49F4D" stroke-width="3"/>
