  <circle cx="262" cy="736" r="7" fill="#2F7AD8"/><text x="286" y="742" fill="#334150" font-family="Arial, sans-serif" font-size="21">Un solo contrato, una sola factura y mejor control de presupuesto</text>
  <circle cx="262" cy="778" r="7" fill="#2F7AD8"/><text x="286" y="784" fill="#334150" font-family="Arial, sans-serif" font-size="21">Menor complejidad de integración, credenciales, redes y auditoría</text>
  <circle cx="776" cy="736" r="7" fill="#2E8B45"/><text x="800" y="742" fill="#334150" font-family="Arial, sans-serif" font-size="21">El router evita sobregastar usando siempre el modelo más caro</text>
  <circle cx="776" cy="778" r="7" fill="#2E8B45"/><text x="800" y="784" fill="#334150" font-family="Arial, sans-serif" font-size="21">Más fácil aplicar políticas corporativas y observabilidad central</text>

