  <text x="464" y="306" fill="#604512" font-family="Arial, sans-serif" font-size="19">RBAC, políticas, observabilidad</text>
  <text x="464" y="334" fill="#604512" font-family="Arial, sans-serif" font-size="19">Evaluaciones, despliegue y billing unificado</text>

