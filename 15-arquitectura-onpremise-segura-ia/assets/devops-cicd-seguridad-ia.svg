<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="780" fill="#FBF8F1"/>
  <text x="82" y="92" fill="#202833" font-family="Arial, sans-serif" font-size="34" font-weight="700">CI/CD y DevOps como capa de seguridad para IA</text>
  <text x="82" y="128" fill="#5E6773" font-family="Arial, sans-serif" font-size="20">No solo importa qué se despliega: importa cómo se prueba, aprueba y promueve a producción</text>

  <rect x="88" y="240" width="190" height="120" rx="22" fill="#DDEBFB" stroke="#7BA2D9" stroke-width="2"/>
  <text x="117" y="290" fill="#1C395A" font-family="Arial, sans-serif" font-size="26" font-weight="700">Commit</text>
  <text x="117" y="324" fill="#1C395A" font-family="Arial, sans-serif" font-size="18">Código, prompts,</text>
  <text x="117" y="348" fill="#1C395A" font-family="Arial, sans-serif" font-size="18">config y políticas</text>

  <rect x="332" y="240" width="210" height="120" rx="22" fill="#E7F6E7" stroke="#7AA97C" stroke-width="2"/>
  <text x="362" y="290" fill="#234926" font-family="Arial, sans-serif" font-size="26" font-weight="700">CI</text>
  <text x="362" y="324" fill="#234926" font-family="Arial, sans-serif" font-size="18">Tests, lint, validación</text>
  <text x="362" y="348" fill="#234926" font-family="Arial, sans-serif" font-size="18">de componentes IA</text>

  <rect x="596" y="240" width="230" height="120" rx="22" fill="#FFF2D4" stroke="#C7A352" stroke-width="2"/>
  <text x="626" y="290" fill="#5C4716" font-family="Arial, sans-serif" font-size="26" font-weight="700">Security Gates</text>
  <text x="626" y="324" fill="#5C4716" font-family="Arial, sans-serif" font-size="18">Secrets scan, permisos,</text>
  <text x="626" y="348" fill="#5C4716" font-family="Arial, sans-serif" font-size="18">dependencias y políticas</text>

  <rect x="880" y="240" width="200" height="120" rx="22" fill="#FDE4ED" stroke="#C7849E" stroke-width="2"/>
  <text x="910" y="290" fill="#5A2741" font-family="Arial, sans-serif" font-size="26" font-weight="700">Approval</text>
  <text x="910" y="324" fill="#5A2741" font-family="Arial, sans-serif" font-size="18">Pull request</text>
  <text x="910" y="348" fill="#5A2741" font-family="Arial, sans-serif" font-size="18">y revisión humana</text>

  <rect x="1134" y="240" width="182" height="120" rx="22" fill="#E7EBF5" stroke="#7B8BA8" stroke-width="2"/>
  <text x="1164" y="290" fill="#2B3C58" font-family="Arial, sans-serif" font-size="26" font-weight="700">Deploy</text>
  <text x="1164" y="324" fill="#2B3C58" font-family="Arial, sans-serif" font-size="18">Promoción controlada</text>
  <text x="1164" y="348" fill="#2B3C58" font-family="Arial, sans-serif" font-size="18">entre ambientes</text>

  <path d="M278 300H332" stroke="#4A5D73" stroke-width="4" stroke-linecap="round"/>
  <path d="M542 300H596" stroke="#4A5D73" stroke-width="4" stroke-linecap="round"/>
  <path d="M826 300H880" stroke="#4A5D73" stroke-width="4" stroke-linecap="round"/>
  <path d="M1080 300H1134" stroke="#4A5D73" stroke-width="4" stroke-linecap="round"/>

  <rect x="162" y="462" width="1070" height="220" rx="28" fill="#FFFFFF" stroke="#D3CCBF" stroke-width="2"/>
  <text x="202" y="516" fill="#1E2833" font-family="Arial, sans-serif" font-size="28" font-weight="700">Controles que reduce un pipeline CI/CD bien diseñado</text>
  <circle cx="212" cy="570" r="7" fill="#3973D4"/><text x="234" y="576" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Evita despliegues manuales inseguros de agentes, MCPs y conectores</text>
  <circle cx="212" cy="614" r="7" fill="#3973D4"/><text x="234" y="620" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Detecta secretos expuestos antes de que lleguen a producción</text>
  <circle cx="212" cy="658" r="7" fill="#3973D4"/><text x="234" y="664" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Permite rollback y trazabilidad cuando un cambio de IA sale mal</text>

  <circle cx="780" cy="570" r="7" fill="#2D8A3D"/><text x="802" y="576" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Separa desarrollo, prueba, preproducción y producción</text>
  <circle cx="780" cy="614" r="7" fill="#2D8A3D"/><text x="802" y="620" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Exige revisión humana para cambios sensibles</text>
  <circle cx="780" cy="658" r="7" fill="#2D8A3D"/><text x="802" y="664" fill="#2A3441" font-family="Arial, sans-serif" font-size="21">Fortalece seguridad operativa, no solo seguridad de red</text>
</svg>
